<!DOCTYPE html>
<html>
<body background="https://m.media-amazon.com/images/I/91armhHyTML._SL1500_.jpg">
<style>
    
    fieldset {
        border: 2px solid #ccc;
        border-radius: 5px;
        padding: 20px;
        margin-bottom: 10px;
        text-align: center;
        background-color: white;
        border: 2px solid sandybrown;
        border-style: dashed;
        
    }
    p {
        text-align: center;
        font-size: 25px;
        font-weight: bolder;
        border: 2px solid black;
    }
    form {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif
        
       
    }

    .stars {
        display: flex;
        direction: rtl;
        font-size: 3rem;
        justify-content: center;
    }
    .stars input{
        display: none;
    }
    .stars label{
        color:#ccc;
        transition: color 0.2s;
    }

    
    .stars input:checked ~ label,
    .stars label:hover ~ input:checked ~ label { 
        color: gold;
    }

    button{
        background-color: blueviolet;
        color:white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        width: 80%;
    }
    ul{
        list-style-type: none;
        padding: 0;
       
    }

    .movie-list{
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        
    }
    
    button.delete-btn{
        background-color: red;
        color: white;
        border: none;
        
    }

</style>

<form id="movieInfo" action="" method="post" class="movie-list" >
    <fieldset class="movie-info">
    <p> Add Movie</p>
    <label for="Title">Title:</label>
    <br>
    <br>
    <input type="text" id="Title" name="Title" required>
    <br>
    <br>
    <label for="Year">Year:</label>
    <br>
    <br>
    <input type="number" id="Year" name="Year" required>
    <br>
    <br>
    <label for="Genre">Genre:</label>
    <br>
    <br>
    <select name="Genre" id="Genre" required>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Horror">Horror</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Mystery">Mystery</option>
    </select>
    <br>
    <br>
    <label for="Rating">Rating:</label>
    <div id="rating"  class="stars">
         <input type="radio" name="star"  value="1" id="star1"><label for="star1">★</label>
        <input type="radio" name="star"  value="2" id="star2"><label for="star2">★</label>
        <input type="radio" name="star"  value="3" id="star3"><label for="star3">★</label>
        <input type="radio" name="star"  value="4" id="star4"><label for="star4">★</label>
        <input type="radio" name="star"  value="5" id="star5"><label for="star5">★</label>
    </div>

    <button  type = "submit" >Add Movie</button>
   
    <p> Movie List</p>
    <ul id="movieList"></ul>

   </form>
    <script>
    
    const movieInfo = document.getElementById("movieInfo");
        movieInfo.addEventListener("submit", function(event){
            event.preventDefault(); 
            getMovie();
        });

        const stars = document.querySelectorAll(".stars input");
        let rating = 0;
        
        stars.forEach(function(star, i){ //iterates through each star
            star.addEventListener("click", function(){ 
                rating = i + 1; 
        
        stars.forEach(function(j, k){ 
            if(k <= i){ 
                j.classList.add("⭐");
            } else {
                j.classList.remove("⭐");
            }
        });
            });
        });

    const form = document.getElementById("movieInfo");

    function getMovie(){ 

         const obj = {
                title: document.getElementById("Title").value,
                year: document.getElementById("Year").value,
                genre: document.getElementById("Genre").value

            };

        const movies = JSON.parse(localStorage.getItem("movies")) || [];
        let exists = movies.find(movie => movie.title.toLowerCase() === obj.title.toLowerCase() && movie.year === obj.year); //checks if movie already exists

        if(exists){  //if it does exists, it will begin calculating the average rating with the addition of a new rating of the existing movie
            exists.totalRating += rating;
            exists.ratingCount += 1;
            exists.rating = Math.round(exists.totalRating / exists.ratingCount); // updates average rating 
        } else {
            const newMovie = {
                title: obj.title,
               year: obj.year,
               genre: obj.genre,
                    rating: rating,
                    totalRating: rating,
                    ratingCount: 1
                };
                movies.push(newMovie); // adds the new movie to the list
                
            }
    
       
        localStorage.setItem("movies", JSON.stringify(movies)); // Reads and saves movie list to local storage
        displayMovies();
        document.getElementById("movieInfo").reset(); // Clears the form after submission
        rating = 0;

        stars.forEach(function(star){
            star.classList.remove("active");
        });
    }

        function displayMovies(){
            const movies = JSON.parse(localStorage.getItem("movies")) || []; // Retrieves movie list from local storage
            const movieList = document.getElementById("movieList");
            
            movieList.innerHTML = ""; // Empties movie list that currently exists
            movies.forEach((movie) => { // Iterates through the movie list and creates a list item for each movie
                const li = document.createElement("li"); 
               // Calculates the average rating and rounds it to the nearest whole number
               const avgRating = Math.round(movie.totalRating / movie.ratingCount); //rounds the average rating up or down

               console.log(avgRating);
                const stars = "⭐".repeat(6 - avgRating); // Creates a string of stars based on the movie rating and displays the rounded average rating 
                li.innerHTML = `${movie.title} (${movie.year}) - ${movie.genre}, Rating: ${stars}`; //the format of the content 
                movieList.appendChild(li); // Adds the item to the movie list

                const deleteBtn = document.createElement("button"); // Creates a delete button
                deleteBtn.innerText = "Delete";
                deleteBtn.className = "delete-btn"; 
                deleteBtn.addEventListener("click", () => {

                    let confirmation = confirm("Are you sure you want to delete?") // Confirms deletion

                    if(confirmation){
                    const index = movies.indexOf(movie);  // Finds index of movie
                    if (index > -1) { 
                        movies.splice(index, 1); // Removes movie from array once found and confirmed deletion
                        localStorage.setItem("movies", JSON.stringify(movies));
                        displayMovies();
                    }
                }
                });
                li.appendChild(deleteBtn); // Adds the delete button to the list 

            
            });
        }
        window.addEventListener("load", displayMovies); // To keep the updated movie list on load or screen refresh
      


    </script>

    



</body>
</html>
